<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>設定與說明 | 末班車生存戰</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #aaaaaa; --danger: #ff5252; --info: #2196F3; --warning: #ffb300; }
        
        /* 🌟 SPA 專用：究極去白條排版魔法 */
        html, body { 
            overflow-x: hidden; 
            height: 100%; 
            width: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: var(--text-main); 
            -webkit-user-select: none; 
            user-select: none;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* 🌟 物理隔離，防止 Iframe 壓縮 */
        }
        
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .container { width: 90%; max-width: 400px; padding: 20px 0 50px 0; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #333; }
        .header-row h1 { font-size: 20px; margin: 0; color: var(--text-main); }
        
        /* 🌟 智慧型返回按鈕 */
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .back-btn:active { background: #555; transform: scale(0.95); }

        .section { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; }
        .section h3 { margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; color: var(--info); font-size: 16px; }
        ul { padding-left: 20px; line-height: 1.8; font-size: 14px; color: var(--text-sub); margin-bottom: 0; }
        
        .link-btn { display: block; background: #1a1a1a; color: white; border: 1px solid #555; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 10px; transition: 0.1s; }
        .link-btn:active { background: #333; transform: scale(0.98); }
        
        .version-text { text-align: center; color: #666; font-size: 12px; margin-top: 20px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>⚙️ 設定與說明</h1>
            <a href="javascript:void(0)" onclick="if(window.parent && window.parent.closePageOnly) { window.parent.closePageOnly(); } else { window.history.back(); }" class="back-btn">⬅ 返回設定</a>
        </div>

        <div class="section">
            <h3>📖 快速使用說明</h3>
            <ul>
                <li>點擊標題右側的「🔍」可切換至全查詢模式。</li>
                <li>點擊輸入框時，按一下旁邊的星星「★」即可加入最愛並置頂。</li>
                <li>系統會優先連線交通部 TDX，若遇斷網則自動啟動離線演算法。</li>
                <li><span style="color: var(--warning); font-weight: bold;">【轉乘防禦機制】</span>只要偵測到需要跨線轉乘，系統為求安全，一律會自動篩選出「最嚴格（最早）」的發車死線。</li>
            </ul>
        </div>
    </div>
</body>
</html>

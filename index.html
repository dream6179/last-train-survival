<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>末班車生存戰 | 深夜通勤導航</title>
    <meta name="description" content="趕不上末班車？開啟極限求生模式！幫你精準計算捷運末班車時間，並提供 Uber、GoShare 等深夜 Plan B 備案。">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚇</text></svg>">
    <meta property="og:title" content="末班車生存戰 | 你的深夜回家導航">
    <meta property="og:description" content="趕不上末班車？一鍵查詢真實末班車發車倒數，專屬夜歸人的極限生存指南。">
    <meta property="og:image" content="https://images.unsplash.com/photo-1517737272895-17d1cc961cb3?q=80&w=1200&auto=format&fit=crop">
    <meta property="og:type" content="website">

    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #aaaaaa; --danger: #ff5252; --success: #4caf50; --warning: #ffb300; --info: #2196F3; }
        html, body { overflow: hidden; height: 100%; width: 100%; margin: 0; padding: 0; background-color: var(--bg-color); overscroll-behavior: none; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text-main); display: flex; justify-content: center; align-items: center; user-select: none; -webkit-user-select: none; }
        .container { text-align: center; width: 90%; max-width: 400px; height: 92vh; max-height: 680px; background-color: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; padding: 0 20px; box-sizing: border-box; gap: 6px; position: relative; }
        
        .sheet-content, .search-result-box, .autocomplete-list { -ms-overflow-style: none; scrollbar-width: none; }
        .sheet-content::-webkit-scrollbar, .search-result-box::-webkit-scrollbar, .autocomplete-list::-webkit-scrollbar { display: none; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-row h1 { font-size: 22px; color: var(--danger); margin: 0; cursor: pointer; transition: transform 0.1s; }
        .header-row h1:active { transform: scale(0.95); }
        .mode-toggle-btn { background: #333; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .mode-toggle-btn:active { transform: scale(0.9); background: #555; }

        .location-block { display: flex; flex-direction: column; width: 100%; text-align: left; margin-bottom: 2px; }
        .location-block label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; font-weight: bold; }
        .select-group { display: flex; gap: 8px; position: relative; }
        select, .station-input { background-color: #2c2c2c; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 15px; outline: none; cursor: pointer; box-sizing: border-box; }
        select { appearance: none; }
        select:focus, .station-input:focus { border-color: var(--danger); }
        .type-select { width: 35%; text-align: center; }
        .autocomplete-wrapper { position: relative; width: 65%; }
        .station-input { width: 100%; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background-color: #2c2c2c; border: 1px solid #444; border-top: none; border-radius: 0 0 8px 8px; z-index: 99; max-height: 250px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: none; }
        .dropdown-item { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: white; font-size: 15px; transition: background-color 0.1s; }
        .dropdown-item:active { background-color: #444; }
        .star-icon { font-size: 18px; cursor: pointer; padding: 0 5px; transition: transform 0.2s; }
        .star-icon:active { transform: scale(1.3); }
        .dropdown-divider { height: 1px; background-color: #444; margin: 4px 10px; }
        .advanced-toggle-btn { background: none; border: 1px dashed #444; color: var(--text-sub); padding: 5px; border-radius: 8px; font-size: 12px; cursor: pointer; margin: 5px 0; transition: 0.2s; }
        .advanced-toggle-btn:active { background: #333; color: white; }

        .time-area { margin: 10px 0; display: flex; flex-direction: column; align-items: center; }
        .time-display { font-size: 50px; font-weight: bold; color: #e0e0e0; font-variant-numeric: tabular-nums; letter-spacing: 1px; line-height: 1; transition: 0.2s; cursor: pointer; }
        .time-display:active { transform: scale(0.95); }
        .status { font-size: 13px; color: var(--text-sub); margin: 5px 0; height: 16px; }
        
        .main-action-btn { color: white; border: none; padding: 15px; font-size: 17px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.1s; margin-top: 5px; }
        .main-action-btn:active { transform: scale(0.98); }
        .main-action-btn:disabled { background-color: #555; cursor: not-allowed; transform: none; }
        
        #action-btn { background-color: var(--success); }
        #action-btn.btn-danger { background-color: var(--danger); }
        #action-btn.btn-danger:active { background-color: #d50000; }
        #action-btn.btn-warning { background-color: var(--warning); color: #121212; }
        #action-btn.btn-warning:active { background-color: #ff9800; }
        #search-action-btn { background-color: var(--info); margin-top: 15px;}
        #search-action-btn:active { background-color: #1976D2; }

        .plan-b-container { display: none; flex-direction: column; width: 100%; gap: 8px; margin-top: 5px; }
        .plan-b-option { border: none; border-radius: 10px; padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.1s; text-decoration: none; }
        .plan-b-option:active { transform: scale(0.98); filter: brightness(1.1); }
        .option-name { font-size: 15px; font-weight: bold; }
        .option-meta { font-size: 11px; opacity: 0.7; font-weight: normal; margin-left: 5px; }
        .option-price { font-size: 15px; font-weight: bold; font-variant-numeric: tabular-nums; }
        .btn-uber { background-color: #1a1a1a; color: #ffffff; border: 1px solid #333; }
        .btn-goshare { background-color: #009999; color: #ffffff; }
        .btn-youbike { background-color: #ccaa00; color: #121212; }
        .btn-reset { background-color: transparent; color: var(--text-sub); border: 1px dashed #555; justify-content: center; margin-top: 5px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; }
        .btn-reset:active { background-color: #333; color: white; border-color: #888; }

        .footer { margin-top: 15px; font-size: 11px; color: #666; line-height: 1.6; display: flex; flex-direction: column; align-items: center; }
        .footer-links-container { display: flex; gap: 20px; margin-top: 5px; }
        .footer-toggle { color: var(--success); text-decoration: none; font-weight: bold; padding: 5px 10px; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .footer-toggle:active { background: #333; }
        .contact-links { display: none; flex-direction: row; gap: 10px; margin-top: 8px; }
        .contact-btn { text-decoration: none; color: white; font-weight: bold; font-size: 12px; padding: 6px 12px; border-radius: 15px; }
        .btn-gmail { background-color: #ea4335; }
        .btn-discord { background-color: #5865F2; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 90; }
        .overlay.active { opacity: 1; pointer-events: all; }

        .bottom-sheet { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 400px; height: 80vh; background-color: var(--card-bg); border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); transform: translate(-50%, 100%); transition: transform 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); z-index: 100; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .bottom-sheet.active { transform: translate(-50%, 0); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .sheet-header h3 { margin: 0; font-size: 18px; color: var(--text-main); }
        .close-sheet-btn { background: var(--danger); color: white; border: none; padding: 5px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .sheet-content { flex-grow: 1; overflow-y: auto; color: var(--text-sub); font-size: 14px; line-height: 1.5; }
        
        .search-result-box { margin-top: 15px; background: #222; border-radius: 10px; padding: 15px; min-height: 150px; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #666; font-size: 13px; border: 1px dashed #444; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--info); cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #444; border-radius: 2px; }
    </style>
    
    <script src="/js/routing.js"></script>
</head>
<body>

<audio id="bgm-audio" preload="auto">
    <source src="/audio/Midnight_at_Platform_Four.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="header-row">
        <h1 id="main-title" onclick="window.location.href='/collection.html'">末班車生存戰</h1>
        <div style="display: flex; gap: 8px;">
            <button class="mode-toggle-btn" id="header-mute-btn" onclick="toggleMute()" title="開關背景音樂">🔇</button>
            <button class="mode-toggle-btn" id="mode-toggle-btn" onclick="toggleAppMode()" title="切換至全查詢模式">🔍</button>
        </div>
    </div>

    <div id="mode-survival">
        <div class="location-block">
            <label>出發地</label>
            <div class="select-group">
                <select class="type-select" id="start-type" onchange="updateStationOptions('start')">
                    <option value="trtc" selected>北捷</option>
                    <option value="tra">台鐵</option>
                    <option value="thsr">高鐵</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="start-station-input" class="station-input" placeholder="輸入或選擇車站" autocomplete="off">
                    <div id="start-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>

        <div class="location-block" id="transfer-block" style="display: none;">
            <label style="color: var(--warning);">轉乘站</label>
            <div class="select-group">
                <select class="type-select" disabled style="opacity: 0.7; cursor: not-allowed; background-color: #333;">
                    <option selected>換北捷</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="transfer-station-input" class="station-input" placeholder="選擇轉乘車站" autocomplete="off">
                    <div id="transfer-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>

        <button class="advanced-toggle-btn" onclick="openAdvancedSheet()" style="display: none;">⛙ 加入中繼轉乘站 (進階模式)</button>

        <div class="location-block">
            <label>目的地</label>
            <div class="select-group">
                <select class="type-select" id="end-type" onchange="updateStationOptions('end')">
                    <option value="trtc" selected>北捷</option>
                    <option value="thsr">高鐵</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="end-station-input" class="station-input" placeholder="輸入或選擇車站" autocomplete="off">
                    <div id="end-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>
        
        <div class="time-area">
            <div class="status" id="status-text">現在時間</div>
            <div class="time-display" id="time-display" onclick="window.location.href='/collection.html'">00:00:00</div>
            <div class="status">目標發車：<span id="speed-mode" style="color: #ffea00; opacity:0.8;">待查驗...</span></div>
        </div>
        
        <button id="action-btn" class="main-action-btn" onclick="handleAction()">開始計算轉乘</button>
        <button id="cancel-btn" class="btn-reset" style="display: none;" onclick="resetPlan()"><span class="option-name">🔄 終止求生，重新安排</span></button>

        <div id="plan-b-container" class="plan-b-container">
            <button class="plan-b-option btn-uber vehicle-option" onclick="openWeb('Uber')"><span class="option-name">呼叫 Uber <span class="option-meta">~25min</span></span><span class="option-price">~$300</span></button>
            <button class="plan-b-option btn-goshare vehicle-option" onclick="openWeb('GoShare')"><span class="option-name">騎 GoShare <span class="option-meta">~30min</span></span><span class="option-price">~$80</span></button>
            <button class="plan-b-option btn-youbike vehicle-option" onclick="openWeb('YouBike')"><span class="option-name">熱血 YouBike <span class="option-meta">~60min</span></span><span class="option-price">~$15</span></button>
            <button class="plan-b-option btn-reset" onclick="resetPlan()"><span class="option-name">🔄 重新安排行程</span></button>
        </div>
    </div>

    <div id="mode-search" style="display: none;">
        <p style="color: var(--text-sub); font-size: 13px; margin-top: 0; margin-bottom: 15px;">想查哪站？我們去 TDX 資料庫幫你找。</p>
        
        <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 10px; border: 1px solid #333;">
            <label style="color: white; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="search-time-mode" value="now" checked style="accent-color: var(--info);"> ⏱️ 即時班次
            </label>
            <label style="color: white; font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="search-time-mode" value="last" style="accent-color: var(--danger);"> 🚨 終極末班車
            </label>
        </div>

        <div class="location-block">
            <label>查詢車站</label>
            <div class="select-group">
                <select class="type-select" id="search-type" onchange="updateStationOptions('search')">
                    <option value="trtc" selected>北捷</option>
                    <option value="tra">台鐵</option>
                    <option value="thsr">高鐵</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="search-station-input" class="station-input" placeholder="輸入或選擇車站" autocomplete="off">
                    <div id="search-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>
        <button id="search-action-btn" class="main-action-btn" onclick="executeFullSearch()">🔍 查詢發車時刻</button>
        <div class="search-result-box" id="search-result-box">等待檢索指令...</div>
    </div>

    <div class="footer">
        <span>本服務由綠茶地瓜維護</span>
        <div class="footer-links-container">
            <a class="footer-toggle" onclick="toggleContact()">👉 聯絡我們 👈</a>
            <a class="footer-toggle" onclick="openSettingsSheet()">⚙️ 快速設定</a>
        </div>
        <div class="contact-links" id="contact-links">
            <a href="mailto:x778888778@gmail.com?subject=末班車生存戰-開發回饋" class="contact-btn btn-gmail">✉️ Gmail</a>
            <a href="https://discord.gg/vPgU2KaSZr" target="_blank" class="contact-btn btn-discord">💬 Discord</a>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<div class="bottom-sheet" id="advanced-sheet">
    <div class="sheet-header"><h3>進階轉乘路線設定</h3><button class="close-sheet-btn" onclick="closeAllSheets()">完成</button></div>
    <div class="sheet-content">
        <p>在這裡，您可以打造像「中山 ➡️ 北車 ➡️ 客運1815」這種多段極限轉乘任務。</p>
    </div>
</div>

<div class="bottom-sheet" id="settings-sheet">
    <div class="sheet-header"><h3>⚙️ 快速設定</h3><button class="close-sheet-btn" onclick="closeAllSheets()">關閉</button></div>
    <div class="sheet-content">
        <button class="plan-b-option" onclick="shareApp()" style="background-color: #333; color: white; width: 100%; justify-content: center; margin-bottom: 20px;"><span class="option-name">🔗 分享這個求生工具給朋友</span></button>
        
        <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 20px;">
            <h4 style="color: white; margin-top: 0; margin-bottom: 10px;">🎵 背景音樂設定</h4>
            <div style="display: flex; align-items: center; gap: 15px; background: #2c2c2c; padding: 10px 15px; border-radius: 10px;">
                <button id="mute-btn" style="background: none; border: none; font-size: 20px; cursor: pointer; padding: 0;" onclick="toggleMute()">🔇</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0" style="flex-grow: 1;" oninput="updateVolume(this.value)">
            </div>
            <p style="font-size: 11px; color: #888; margin-top: 5px; text-align: center;">深夜的月台，適合來點 Lo-Fi 放鬆一下</p>
        </div>
        
        <div style="margin-top: 25px; border-top: 1px solid #333; padding-top: 20px;">
            <button class="plan-b-option" onclick="window.location.href='/collection.html'" style="background-color: #2a2a2a; border: 1px solid var(--warning); justify-content: center;">
                <span class="option-name" style="color: var(--warning);">🏆 前往彩蛋與收集冊專區</span>
            </button>
        </div>

        <div style="margin-top: 25px; border-top: 1px solid #333; padding-top: 20px;">
            <button class="plan-b-option" onclick="window.location.href='/about.html'" style="background-color: #1a1a1a; color: white; border: 1px solid #555; justify-content: center;">
                <span class="option-name">📖 使用說明與開發者資訊</span>
            </button>
        </div>
    </div>
</div>

<div class="bottom-sheet" id="error-sheet" style="z-index: 9999;">
    <div class="sheet-header"><h3 style="color: var(--danger);">⚠️ 哎呀，出錯了！</h3><button class="close-sheet-btn" onclick="closeErrorSheet()">關閉</button></div>
    <div class="sheet-content">
        <p style="margin-top: 0; font-size: 13px;">系統遇到了一點小亂流。請幫忙複製下方的錯誤代碼並交給開發者，我們會盡快找出原因！</p>
        <textarea id="error-log-output" readonly style="width: 100%; height: 150px; background: #111; color: #ff5252; border: 1px dashed #555; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; margin-bottom: 10px; resize: none; box-sizing: border-box;"></textarea>
        <button class="main-action-btn" style="background-color: #333; border: 1px solid #555;" onclick="copyErrorLog()">📋 複製錯誤代碼</button>
    </div>
</div>

<script src="/js/main.js"></script>

</body>
</html>

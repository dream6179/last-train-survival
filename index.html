<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>末班車生存 | 深夜通勤導航</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #aaaaaa; --danger: #ff5252; --success: #4caf50; --warning: #ffb300; --info: #2196F3; }
        html, body { overflow: hidden; height: 100%; width: 100%; margin: 0; padding: 0; background-color: var(--bg-color); overscroll-behavior: none; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text-main); display: flex; justify-content: center; align-items: center; user-select: none; -webkit-user-select: none; }
        .container { text-align: center; width: 90%; max-width: 400px; height: 92vh; max-height: 680px; background-color: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; padding: 0 20px; box-sizing: border-box; gap: 6px; position: relative; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-row h1 { font-size: 22px; color: var(--danger); margin: 0; cursor: pointer; }
        .mode-toggle-btn { background: #333; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .location-block { display: flex; flex-direction: column; width: 100%; text-align: left; margin-bottom: 2px; }
        .location-block label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; font-weight: bold; }
        .select-group { display: flex; gap: 8px; position: relative; }
        select, .station-input { background-color: #2c2c2c; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 15px; outline: none; width: 100%; box-sizing: border-box; }
        .type-select { width: 35%; text-align: center; }
        .autocomplete-wrapper { position: relative; width: 65%; }
        .time-area { margin: 10px 0; display: flex; flex-direction: column; align-items: center; }
        .time-display { font-size: 50px; font-weight: bold; color: #e0e0e0; letter-spacing: 1px; line-height: 1; }
        .status { font-size: 13px; color: var(--text-sub); margin: 5px 0; height: 16px; }
        .main-action-btn { background-color: var(--success); color: white; border: none; padding: 15px; font-size: 17px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .plan-b-container { display: none; flex-direction: column; width: 100%; gap: 8px; margin-top: 5px; }
        .plan-b-option { border-radius: 10px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; background: #1a1a1a; color: white; border: 1px solid #333; }
        .btn-reset { background: transparent; color: var(--text-sub); border: 1px dashed #555; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 5px; display: flex; justify-content: center; }
        .footer { margin-top: 15px; font-size: 11px; color: #666; display: flex; flex-direction: column; align-items: center; }
        .footer-links-container { display: flex; gap: 20px; margin-top: 5px; }
        .footer-toggle { color: var(--success); font-weight: bold; cursor: pointer; padding: 5px; }
        .contact-links { display: none; gap: 10px; margin-top: 8px; }
        .contact-btn { text-decoration: none; color: white; font-size: 12px; padding: 6px 12px; border-radius: 15px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 90; }
        .overlay.active { opacity: 1; pointer-events: all; }
        .bottom-sheet { position: fixed; bottom: 0; left: 50%; width: 100%; max-width: 400px; height: 80vh; background-color: var(--card-bg); border-radius: 20px 20px 0 0; transform: translate(-50%, 100%); transition: transform 0.3s; z-index: 100; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        .bottom-sheet.active { transform: translate(-50%, 0); }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        #spa-frame { width: 100%; height: 100%; border: none; border-radius: 20px 20px 0 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>末班車生存</h1>
        <div style="display: flex; gap: 8px;">
            <button class="mode-toggle-btn" onclick="openPage('/gemini.html')">🤖</button>
            <button class="mode-toggle-btn" onclick="toggleAppMode()">🔍</button>
        </div>
    </div>

    <div id="mode-survival">
        <div class="location-block">
            <label>出發地</label>
            <div class="select-group">
                <select class="type-select" id="start-type" onchange="updateStationOptions('start')">
                    <option value="trtc">北捷</option><option value="tra">台鐵</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper"><input type="text" id="start-station-input" class="station-input" placeholder="選擇車站"></div>
            </div>
        </div>
        <div class="location-block" id="start-bus-stop-block" style="display: none; margin-top: 4px;">
            <div class="select-group">
                <div class="type-select" style="font-size:12px; color:var(--warning);">📍 所在站牌</div>
                <div class="autocomplete-wrapper"><input type="text" id="start-bus-stop-input" class="station-input" placeholder="輸入站牌名稱"></div>
            </div>
        </div>

        <div class="location-block">
            <label>目的地</label>
            <div class="select-group">
                <select class="type-select" id="end-type" onchange="updateStationOptions('end')">
                    <option value="trtc">北捷</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper"><input type="text" id="end-station-input" class="station-input" placeholder="選擇車站"></div>
            </div>
        </div>
        
        <div class="time-area">
            <div class="status">現在時間</div>
            <div id="time-display" class="time-display">00:00:00</div>
            <div class="status">目標發車：<span id="speed-mode" style="color: #ffea00;">待查驗...</span></div>
        </div>
        
        <button id="action-btn" class="main-action-btn" onclick="handleAction()">開始計算轉乘</button>
        <button id="cancel-btn" class="btn-reset" style="display: none;" onclick="resetPlan()">🔄 終止求生</button>

        <div id="plan-b-container" class="plan-b-container">
            <a href="https://www.uber.com" class="plan-b-option"><span>呼叫 Uber</span><span>~$300</span></a>
            <button class="btn-reset" onclick="resetPlan()">🔄 重新安排</button>
        </div>
    </div>

    <div class="footer">
        <span>本服務由綠茶地瓜維護</span>
        <div class="footer-links-container">
            <a class="footer-toggle" onclick="toggleContact()">👉 聯絡我們 👈</a>
            <a class="footer-toggle" onclick="openSettingsSheet()">⚙️ 快速設定</a>
        </div>
        <div class="contact-links" id="contact-links">
            <a href="mailto:x778888778@gmail.com" class="contact-btn" style="background:#ea4335;">✉️ Gmail</a>
            <a href="https://discord.gg/vPgU2KaSZr" class="contact-btn" style="background:#5865F2;">💬 Discord</a>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<div class="bottom-sheet" id="settings-sheet">
    <div class="sheet-header"><h3>⚙️ 快速設定</h3><button onclick="closeAllSheets()" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px;">關閉</button></div>
    <div class="sheet-content" style="text-align:center; padding-top:20px;">
        <p style="color:var(--text-sub);">深夜的月台，祝你平安回家。</p>
        <div style="margin-top: 30px; padding-top: 15px; border-top: 1px dashed #333;">
            <span style="color: #666; font-size: 13px;">目前版本: v2.42</span>
        </div>
    </div>
</div>

<div class="bottom-sheet" id="dynamic-sheet" style="padding:0; overflow:hidden;">
    <iframe id="spa-frame"></iframe>
</div>

<script src="/js/main.js"></script>
<script src="/js/routing.js"></script>
</body>
</html>

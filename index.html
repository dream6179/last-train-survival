<html lang="zh-TW">
<head>

    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --danger: #ff5252;
            --success: #4caf50;
        }

        html, body {
            overflow: hidden; 
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            overscroll-behavior: none; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            height: 92vh; 
            max-height: 680px;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 0 20px; 
            box-sizing: border-box;
            gap: 6px; 
            position: relative; 
        }

        h1 { font-size: 22px; color: var(--danger); margin: 0 0 10px 0; }
        
        .location-block {
            display: flex;
            flex-direction: column;
            width: 100%;
            text-align: left;
            margin-bottom: 2px;
        }
        .location-block label {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 4px;
            font-weight: bold;
        }
        .select-group {
            display: flex;
            gap: 8px;
            position: relative; 
        }
        
        select, .station-input {
            background-color: #2c2c2c;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            box-sizing: border-box;
        }
        select { appearance: none; }
        select:focus, .station-input:focus { border-color: var(--danger); }
        
        .type-select { width: 35%; text-align: center; }
        
        .autocomplete-wrapper {
            position: relative;
            width: 65%;
        }
        .station-input {
            width: 100%;
        }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-top: none;
            border-radius: 0 0 8px 8px;
            z-index: 99;
            max-height: 250px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            display: none; 
        }
        
        .dropdown-item {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 15px;
            transition: background-color 0.1s;
        }
        .dropdown-item:active { background-color: #444; }
        
        .star-icon {
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
            transition: transform 0.2s;
        }
        .star-icon:active { transform: scale(1.3); }

        .dropdown-divider {
            height: 1px;
            background-color: #444;
            margin: 4px 10px;
        }

        .advanced-toggle-btn {
            background: none;
            border: 1px dashed #444;
            color: var(--text-sub);
            padding: 5px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin: 5px 0;
            transition: 0.2s;
        }
        .advanced-toggle-btn:active { background: #333; color: white; }

        .time-area {
            margin: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .time-display {
            font-size: 50px;
            font-weight: bold;
            color: #e0e0e0; 
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
            line-height: 1;
            transition: 0.2s; 
        }
        .status { font-size: 13px; color: var(--text-sub); margin: 5px 0; height: 16px; }
        
        #action-btn {
            background-color: var(--success); 
            color: white;
            border: none;
            padding: 15px;
            font-size: 17px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.1s;
            margin-top: 5px;
        }
        #action-btn:active { transform: scale(0.98); }
        #action-btn:disabled { background-color: #555; cursor: not-allowed; transform: none; }
        
        #action-btn.btn-danger { background-color: var(--danger); }
        #action-btn.btn-danger:active { background-color: #d50000; }

        /* 🌟 取代單一的取消按鈕，變成雙按鈕群組 */
        .action-btn-group {
            display: none; /* 預設隱藏 */

            margin-top: 5px;
            width: 100%;
        }
        .btn-reset, .btn-notify { 
            background-color: transparent; 
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;

        .btn-reset { color: var(--text-sub); border: 1px dashed #555; }
        .btn-reset:active { background-color: #333; color: white; border-color: #888; }

        .btn-notify:active { background-color: rgba(255, 202, 40, 0.2); }

        .plan-b-container {

        .plan-b-option {

            cursor: pointer;
            display: flex;

            text-decoration: none;
        }
        .plan-b-option:active { transform: scale(0.98); filter: brightness(1.1); }
        .option-name { font-size: 15px; font-weight: bold; }
        .option-meta { font-size: 11px; opacity: 0.7; font-weight: normal; margin-left: 5px; }
        .option-price { font-size: 15px; font-weight: bold; font-variant-numeric: tabular-nums; }
        .btn-uber { background-color: #1a1a1a; color: #ffffff; border: 1px solid #333; }
        .btn-goshare { background-color: #009999; color: #ffffff; }
        .btn-youbike { background-color: #ccaa00; color: #121212; }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: #666;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .footer-action-row {
            display: flex;

        .footer-toggle {
            color: var(--success);
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        .footer-toggle:active { background: #333; }
        
        .contact-links {
            display: none; 
            flex-direction: row;
            gap: 10px;
            margin-top: 8px;
        }
        .contact-btn {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 15px;
        }
        .btn-gmail { background-color: #ea4335; }
        .btn-discord { background-color: #5865F2; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.3s;
            z-index: 90;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 80vh; 
            background-color: var(--card-bg);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
            transform: translateY(100%); 
            transition: transform 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); 
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .sheet-header h3 { margin: 0; font-size: 18px; color: var(--text-main); }
        .close-sheet-btn {
            background: var(--danger);
            color: white; border: none; padding: 5px 15px;
            border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .sheet-content {
            flex-grow: 1;
            overflow-y: auto; 
            color: var(--text-sub);
            font-size: 14px;
            line-height: 1.5;
        }

        .setting-btn {
            background: #2c2c2c; 
            color: white; 
            border: none;
            width: 100%; 
            padding: 15px; 
            border-radius: 10px;
            margin-bottom: 10px; 
            cursor: pointer; 
            font-size: 16px;
            text-align: left; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            font-weight: bold;
            transition: 0.2s;
        }
        .setting-btn:active { background: #444; transform: scale(0.98); }
        .setting-arrow { color: #888; font-size: 20px; }
    </style>
</head>

<script>
    let isCountingDown = false;
    let timeLeft = 0; 
    let timer; 
    let cachedTdxToken = ""; 
    let offlineTimetableData = null; 
    let globalStationData = null; 

    // 🌟 推播通知狀態控制
    let isAlarmEnabled = false;
    let notified10Min = false;
    let notified1Min = false;

    let favoriteStations = JSON.parse(localStorage.getItem('lastTrainFavs')) || [];
    let savedStart = localStorage.getItem('lastTrainStart') || '台北車站';
    let savedEnd = localStorage.getItem('lastTrainEnd') || '台北車站';

    const display = document.getElementById('time-display');
    const statusText = document.getElementById('status-text');
    const actionBtn = document.getElementById('action-btn');
    const actionBtnGroup = document.getElementById('action-button-group'); 
    const speedModeText = document.getElementById('speed-mode');
    const planBContainer = document.getElementById('plan-b-container'); 

    const defaultStations = {
        'trtc': '台北車站',
        'tymetro': '台北車站',
        'krtc': '高雄車站',
        'tmrt': '高鐵台中站',
        'tra': '台北車站',
        'thsr': '台北車站',
        'intercity': '台北車站',
        'bus': '台北車站'
    };

    const operatorMap = {
        'trtc': 'TRTC',     
        'tymetro': 'TYMC',  
        'krtc': 'KRTC',     
        'tmrt': 'TMRT'      
    };

    window.onload = async () => {
        try {
            const timeRes = await fetch('/data/offline-timetable.json');
            if (timeRes.ok) offlineTimetableData = await timeRes.json();
            
            const stationRes = await fetch('/data/stations.json');
            if (stationRes.ok) {
                globalStationData = await stationRes.json();
                
                initCustomAutocomplete(); 
                
                document.getElementById('start-station-input').value = savedStart;
                document.getElementById('end-station-input').value = savedEnd;
            }
        } catch (e) {
            console.log("⚠️ 檔案載入失敗。");
        }
    };

    function sendPushNotification(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, { 
                body: body,
                icon: "https://cdn-icons-png.flaticon.com/512/2838/2838912.png" 
            });
        }
    }

    // 🌟 按下鈴鐺按鈕後，才會執行的開啟通知邏輯
    async function enableAlarm() {
        // 第一步：先打預防針，跟使用者解釋手機系統的限制
        alert("⚠️ 系統限制提醒：\n\n為確保倒數精準，請盡量【保持網頁開啟】且【螢幕長亮】。\n\n若您切換APP或鎖定螢幕，手機的省電機制可能會導致倒數暫停與通知失效喔！");
        
        if ("Notification" in window) {
            let permission = Notification.permission;
            // 第二步：如果還沒答應過，才跳出瀏覽器的授權視窗
            if (permission !== "granted" && permission !== "denied") {
                permission = await Notification.requestPermission();
            }
            
            if (permission === "granted") {
                isAlarmEnabled = true;
                
                // 第三步：按鈕變身，讓使用者知道設定成功
                const notifyBtn = document.getElementById('notify-btn');
                notifyBtn.classList.add('active');
                notifyBtn.innerHTML = '<span class="option-name">✅ 提醒已開啟</span>';
                
                sendPushNotification("推播設定成功！", "我們會在最後 10 分鐘與 1 分鐘時提醒您。記得別關閉網頁喔！");
            } else {
                alert("您已拒絕通知權限，若要使用請至瀏覽器設定中開啟。");
            }
        } else {
            alert("您的瀏覽器不支援推播通知功能。");
        }
    }

    function getSmartStationInfo(origin, dest, type) {
        if (!globalStationData || !globalStationData[type] || !globalStationData[type].routes) return null;
        const routeKey = `${origin}-${dest}`;
        return globalStationData[type].routes[routeKey] || null;
    }

    async function fetchRealLastTrainTime(origin, destination, type, retryCount = 0) {
        try {
            const operatorCode = operatorMap[type];
            if (!operatorCode) return null;

            if (!cachedTdxToken) {
                const tokenRes = await fetch('/api/get-token');
                const tokenData = await tokenRes.json();
                cachedTdxToken = tokenData.access_token;
            }

            const info = getSmartStationInfo(origin, destination, type);
            if (!info) return null;
            
            const originCode = info.originCode;
            const terminuses = info.terminuses;
            
            const apiUrl = `https://tdx.transportdata.tw/api/basic/v2/Rail/Metro/StationTimeTable/${operatorCode}?$filter=StationID eq '${originCode}'&$format=JSON`;

            const res = await fetch(apiUrl, {
                headers: { 'Authorization': `Bearer ${cachedTdxToken}` }
            });
            const data = await res.json();

            if ((data.message === 'Unauthorized' || res.status === 401) && retryCount === 0) {
                cachedTdxToken = "";
                return fetchRealLastTrainTime(origin, destination, type, 1);
            }

            if (data && data.length > 0) {
                let maxMinutes = -1;
                let lastTrainTimeStr = "";

                data.forEach(route => {
                    const tdxDestId = route.DestinationStaionID || route.DestinationStationID;
                    if (terminuses.includes(tdxDestId)) {
                        if (route.Timetables && route.Timetables.length > 0) {
                            route.Timetables.forEach(t => {
                                const timeStr = t.DepartureTime; 
                                const [h, m] = timeStr.split(':').map(Number);
                                let adjustedH = h < 4 ? h + 24 : h;
                                let totalMins = adjustedH * 60 + m;

                                if (totalMins > maxMinutes) {
                                    maxMinutes = totalMins;
                                    lastTrainTimeStr = timeStr;
                                }
                            });
                        }
                    }
                });
                if (lastTrainTimeStr !== "") return lastTrainTimeStr;
            } 
            return null;
        } catch (error) {
            return null;
        }
    }

    function toggleFavorite(stationName) {
        if (favoriteStations.includes(stationName)) {
            favoriteStations = favoriteStations.filter(name => name !== stationName);
        } else {
            favoriteStations.push(stationName);
        }
        localStorage.setItem('lastTrainFavs', JSON.stringify(favoriteStations));
        renderCustomDropdown('start');
        renderCustomDropdown('end');
    }

    function renderCustomDropdown(point) {
        const typeSelect = document.getElementById(point + '-type');
        const inputField = document.getElementById(point + '-station-input');
        const listContainer = document.getElementById(point + '-autocomplete-list');
        const selectedType = typeSelect.value;
        
        listContainer.innerHTML = ''; 
        
        let options = [];
        if (globalStationData && globalStationData[selectedType] && globalStationData[selectedType].options) {
            options = globalStationData[selectedType].options;
        }

        const filterText = inputField.value.trim().toLowerCase();
        
        let favList = [];
        let otherList = [];

        options.forEach(station => {
            if (station.name.toLowerCase().includes(filterText) || filterText === '') {
                if (favoriteStations.includes(station.name)) {
                    favList.push(station);
                } else {
                    otherList.push(station);
                }
            }
        });

        const createItem = (station, isFav) => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            
            const nameSpan = document.createElement('span');
            nameSpan.textContent = station.name;

            const starSpan = document.createElement('span');
            starSpan.className = 'star-icon';
            starSpan.textContent = isFav ? '★' : '☆';
            starSpan.style.color = isFav ? '#ffca28' : '#666'; 

            starSpan.addEventListener('mousedown', function(e) {
                e.preventDefault(); 
                e.stopPropagation(); 
                toggleFavorite(station.name);
            });

            item.addEventListener('mousedown', function(e) { e.preventDefault(); });
            item.addEventListener('click', function() {
                inputField.value = station.name;
                listContainer.style.display = 'none';
            });

            item.appendChild(nameSpan);
            item.appendChild(starSpan);
            return item;
        };

        favList.forEach(station => { listContainer.appendChild(createItem(station, true)); });

        if (favList.length > 0 && otherList.length > 0) {
            const divider = document.createElement('div');
            divider.className = 'dropdown-divider';
            listContainer.appendChild(divider);
        }

        otherList.forEach(station => { listContainer.appendChild(createItem(station, false)); });
        
        listContainer.style.display = listContainer.children.length > 0 ? 'block' : 'none';
    }

    function initCustomAutocomplete() {
        ['start', 'end'].forEach(point => {
            const inputField = document.getElementById(point + '-station-input');
            inputField.addEventListener('input', () => renderCustomDropdown(point));
            inputField.addEventListener('focus', () => {
                inputField.value = ''; 
                renderCustomDropdown(point);
            });
        });
    }

    document.addEventListener('click', function (e) {
        ['start', 'end'].forEach(point => {
            const wrapper = document.getElementById(point + '-station-input').parentElement;
            if (!wrapper.contains(e.target)) {
                document.getElementById(point + '-autocomplete-list').style.display = 'none';
            }
        });
    });

    function updateStationOptions(point) {
        const typeSelect = document.getElementById(point + '-type');
        const selectedType = typeSelect.value;
        
        document.getElementById(point + '-station-input').value = defaultStations[selectedType] || '';
        renderCustomDropdown(point);
    }

    function updateClock() {
        if (!isCountingDown) {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            display.innerHTML = `${hh}:${mm}:${ss}`;
        } else {
            if (timeLeft <= 0) {
                clearInterval(timer);
                display.innerHTML = "來不及了💸";
                display.style.fontSize = "50px"; 
                display.style.color = "#ff5252";
                
                actionBtnGroup.style.display = "none";
                planBContainer.style.display = "flex";
                document.querySelectorAll('.vehicle-option').forEach(btn => btn.style.display = "flex");
                statusText.innerHTML = "人生不是只有末班車...";
                return;
            }
            timeLeft--;
            
            // 🌟 只有當使用者點擊過「開啟提醒」時，才會發送這兩個時間點的推播
            if (isAlarmEnabled) {
                if (timeLeft === 600 && !notified10Min) {
                    sendPushNotification("⚠️ 警告：剩下 10 分鐘！", "該結帳收包包前往捷運站了，別再喝了！");
                    notified10Min = true;
                }
                if (timeLeft === 60 && !notified1Min) {
                    sendPushNotification("🚨 最後警告：剩餘 1 分鐘！", "拿出百米衝刺的速度！快跑啊！");
                    notified1Min = true;
                }
            }

            let hours = Math.floor(timeLeft / 3600);
            let minutes = Math.floor((timeLeft % 3600) / 60);
            let seconds = timeLeft % 60;
            
            if (hours > 0) {
                display.innerHTML = `${hours}:${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            } else {
                display.innerHTML = `${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            }
        }
    }

    updateClock();
    timer = setInterval(updateClock, 1000);

    async function handleAction() {
        // 🌟 移除原本會自動跳出的請求權限，現在全交由「鈴鐺按鈕」負責
        
        const startType = document.getElementById('start-type').value;
        const endType = document.getElementById('end-type').value;
        
        const startStationName = document.getElementById('start-station-input').value;
        const endStationName = document.getElementById('end-station-input').value;

        const startStationObj = globalStationData[startType]?.options.find(s => s.name === startStationName);
        const endStationObj = globalStationData[endType]?.options.find(s => s.name === endStationName);

        if (!startStationObj || !endStationObj) {
            alert("⚠️ 找不到這個車站，請確認是否有錯字，或從選單中直接點選！");
            return; 
        }

        localStorage.setItem('lastTrainStart', startStationName);
        localStorage.setItem('lastTrainEnd', endStationName);

        const startStation = startStationObj.id;
        const endStation = endStationObj.id;

        if (startType === endType && startStation === endStation) {
            clearInterval(timer); 
            isCountingDown = false; 
            display.innerHTML = "恭喜到達🎉";
            display.style.fontSize = "40px"; 
            display.style.color = "#4caf50";
            statusText.innerHTML = "你根本不用搭車，早點回家洗洗睡！";
            actionBtn.style.display = "none";
            planBContainer.style.display = "flex";
            document.querySelectorAll('.vehicle-option').forEach(btn => btn.style.display = "none");
            return;
        }

        if (isCountingDown) {
            timeLeft += 60; 
            display.style.color = '#ffea00';
            setTimeout(() => { display.style.color = '#4caf50'; }, 150);
            return;
        }

        let transferPenaltySeconds = 0;
        if (startStation === endStation && startType !== endType) {
            transferPenaltySeconds = 20 * 60; 
            alert("⚠️ 偵測到「同站跨系統轉乘」。\n系統已自動為您預留 20 分鐘步行時間！");
        }

        actionBtn.innerHTML = "⏳ 運算中...";
        actionBtn.disabled = true;

        try {
            let finalTargetTimeString = "23:59"; 
            let connectionStatus = "即時連線";

            if (['trtc', 'tymetro', 'krtc', 'tmrt'].includes(startType) && startType === endType) {
                const realTime = await fetchRealLastTrainTime(startStation, endStation, startType);
                if (realTime) {
                    finalTargetTimeString = realTime;
                } else {
                    const routeKey = `${startStation}-${endStation}`;
                    if (offlineTimetableData && offlineTimetableData[startType] && offlineTimetableData[startType][routeKey]) {
                        finalTargetTimeString = offlineTimetableData[startType][routeKey];
                        connectionStatus = "離線備用";
                        alert("⚠️ 目前網路異常或無法連線，已為您切換至「離線備用」時刻表。");
                    } else {
                        connectionStatus = "系統預設";
                        alert("⚠️ 查無即時與離線資料，將使用系統預設 23:59 估算。");
                    }
                }
            } else {
                const routeKey = `${startStation}-${endStation}`;
                if (offlineTimetableData && offlineTimetableData[startType] && offlineTimetableData[startType][routeKey]) {
                    finalTargetTimeString = offlineTimetableData[startType][routeKey];
                    connectionStatus = "離線備用";
                } else {
                    connectionStatus = "系統預設";
                    alert(`目前尚未串接即時資料，將使用預設 23:59 估算。`);
                }
            }

            isCountingDown = true;
            statusText.innerHTML = "距離末班車發車還剩";
            display.style.color = "#4caf50";
            speedModeText.innerHTML = `${finalTargetTimeString} <span style="font-size:10px; color:#aaa;">(${connectionStatus})</span>`;
            
            // 🌟 隱藏主按鈕，顯示並排的「終止」與「開啟推播」雙按鈕
            actionBtn.style.display = "none";
            actionBtnGroup.style.display = "flex";

            const now = new Date();
            let target = new Date();
            const [hh, mm] = finalTargetTimeString.split(':').map(Number);
            target.setHours(hh, mm, 0, 0); 

            if (now.getHours() >= 4 && hh < 4) {
                target.setDate(target.getDate() + 1); 
            } else if (now.getHours() < 4 && hh >= 4) {
                target.setDate(target.getDate() - 1); 
            }

            timeLeft = Math.floor((target.getTime() - now.getTime()) / 1000) - transferPenaltySeconds;
            if (timeLeft < 0) timeLeft = 0;

            updateClock(); 

        } catch (error) {
            alert("系統發生錯誤，請稍後再試！");
            isCountingDown = false;
        } finally {
            actionBtn.disabled = false;
            if (!isCountingDown) actionBtn.innerHTML = "開始計算轉乘";
        }
    }

    function resetPlan() {
        clearInterval(timer);
        isCountingDown = false;
        
        // 🌟 恢復預設的按鈕狀態
        planBContainer.style.display = "none";    
        actionBtnGroup.style.display = "none"; 
        actionBtn.style.display = "block";        
        actionBtn.innerHTML = "開始計算轉乘";     
        actionBtn.disabled = false;
        
        // 🌟 重置鬧鐘狀態
        isAlarmEnabled = false;
        notified10Min = false;
        notified1Min = false;
        const notifyBtn = document.getElementById('notify-btn');
        notifyBtn.classList.remove('active');
        notifyBtn.innerHTML = '<span class="option-name">🔔 開啟提醒</span>';
        
        statusText.innerHTML = "現在時間";        
        speedModeText.innerHTML = "待查驗...";
        display.style.color = "#e0e0e0"; 
        display.style.fontSize = "50px"; 
        
        document.querySelectorAll('.vehicle-option').forEach(btn => btn.style.display = "flex");
        
        updateClock();
        timer = setInterval(updateClock, 1000);
    }

    function openWeb(appName) {
        let targetUrl = "";
        if (appName === 'Uber') targetUrl = "https://m.uber.com/"; 
        else if (appName === 'GoShare') targetUrl = "https://www.ridegoshare.com/"; 
        else if (appName === 'YouBike') targetUrl = "https://www.youbike.com.tw/region/ntpc/stations/"; 
        window.open(targetUrl, '_blank');
    }

    function toggleContact() {
        const links = document.getElementById('contact-links');
        links.style.display = (links.style.display === "flex") ? "none" : "flex";
    }

    function openSheet(sheetId) {
        document.getElementById('overlay').classList.add('active');
        document.getElementById(sheetId).classList.add('active');
    }

    function closeAllSheets() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('advanced-sheet').classList.remove('active');
        document.getElementById('settings-sheet').classList.remove('active');
    }

    function showHelp() {
        alert("【使用指南】\n\n1. 選擇起迄站：輸入關鍵字或從選單挑選。\n2. 加入最愛：點擊站名旁邊的 ☆ 即可置頂。\n3. 開始倒數：點擊綠色大按鈕，我們會為您連線交通部抓取真實發車時間。\n4. 緊急備案：如果來不及了，我們會自動幫你叫車！");
    }

    function shareApp() {
        if (navigator.share) {
            navigator.share({
                title: '末班車生存戰',
                text: '趕不上末班車？一鍵查詢真實末班車發車倒數，專屬夜歸人的極限生存指南。',
                url: window.location.href
            }).catch((error) => console.log('分享取消或發生錯誤:', error));
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("🔗 網址已複製到剪貼簿！趕快貼給朋友吧！");
            });
        }
    }
</script>

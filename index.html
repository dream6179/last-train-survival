<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>末班車生存 | 深夜通勤導航</title>
    
    <script src="/js/guard.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1 id="main-title">末班車生存</h1>
        <div style="display: flex; gap: 8px;">
            <button class="mode-toggle-btn" onclick="openPage('/gemini.html')">🤖</button>
            <button class="mode-toggle-btn" id="header-mute-btn" onclick="toggleMute()">🔇</button>
            <button class="mode-toggle-btn" onclick="toggleAppMode()">🔍</button>
        </div>
    </div>

    <div id="mode-survival">
        <div class="location-block">
            <label>出發地</label>
            <div class="select-group">
                <select class="type-select" id="start-type" onchange="updateStationOptions('start')">
                    <option value="trtc">北捷</option><option value="tra">台鐵</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="start-station-input" class="station-input" placeholder="選擇車站">
                    <div id="start-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>

        <div class="location-block">
            <label>目的地</label>
            <div class="select-group">
                <select class="type-select" id="end-type" onchange="updateStationOptions('end')">
                    <option value="trtc">北捷</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="end-station-input" class="station-input" placeholder="選擇車站">
                    <div id="end-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>
        
        <div class="time-area">
            <div class="status">現在時間</div>
            <div id="time-display" class="time-display">00:00:00</div>
            <div class="status">目標發車：<span id="speed-mode" style="color: #ffea00;">待查驗...</span></div>
        </div>
        
        <button id="action-btn" class="main-action-btn" onclick="handleAction()">開始計算轉乘</button>

        <div id="plan-b-container" class="plan-b-container">
            <a href="https://www.uber.com" class="plan-b-option"><span>呼叫 Uber</span><span>~$300</span></a>
            <button class="btn-reset" onclick="resetPlan()">🔄 重新安排行程</button>
        </div>

        <button id="cancel-btn" class="btn-reset" style="display: none;" onclick="resetPlan()">🔄 中止求生</button>
    </div>

    <div id="mode-search" style="display: none;">
        <div class="location-block">
            <label>查詢車站</label>
            <div class="select-group">
                <select class="type-select" id="search-type" onchange="updateStationOptions('search')">
                    <option value="trtc" selected>北捷</option><option value="tra">台鐵</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="search-station-input" class="station-input" placeholder="輸入或選擇車站">
                    <div id="search-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>
        <button id="search-action-btn" class="main-action-btn" style="background-color: var(--info); margin-top:15px;" onclick="executeFullSearch()">🔍 查詢發車時刻</button>
        <div class="search-result-box" id="search-result-box" style="margin-top: 15px; background: #222; border-radius: 10px; padding: 15px; min-height: 150px; color: #666; font-size: 13px; border: 1px dashed #444;">等待檢索指令...</div>
    </div>

    <div class="footer">
        <div>本服務由綠茶地瓜維護</div>
        <div class="footer-links-container">
            <a class="footer-toggle" onclick="toggleContact()">👉 聯絡我們 👈</a>
            <a class="footer-toggle" onclick="openSettingsSheet()">⚙️ 快速設定</a>
        </div>
        <div class="contact-links" id="contact-links">
            <a href="mailto:x778888778@gmail.com" class="contact-btn" style="background:#ea4335;">✉️ Gmail</a>
            <a href="https://discord.gg/vPgU2KaSZr" class="contact-btn" style="background:#5865F2;">💬 Discord</a>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<div class="bottom-sheet" id="settings-sheet">
    <div class="sheet-header">
        <h3 style="margin:0;">⚙️ 快速設定</h3>
        <button onclick="closeAllSheets()" style="background:var(--danger); color:white; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:bold;">關閉</button>
    </div>
    
    <div class="sheet-content">
        <button class="plan-b-option" onclick="shareApp()" style="background-color: #333;">
            <span>🔗 分享這個求生工具給朋友</span>
        </button>
        
        <button class="plan-b-option" onclick="openPage('/about.html')">
            <span>📖 快速使用說明</span>
        </button>
        
        <button class="plan-b-option" onclick="openPage('/developer.html')">
            <span>👨‍💻 開發者資訊</span>
        </button>
        
        <div style="margin-top: 10px; background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333;">
            <h4 style="color: var(--text-sub); margin: 0 0 10px 0; font-size: 13px;">🎵 背景音樂設定</h4>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="mute-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;" onclick="toggleMute()">🔇</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.3" style="flex: 1;" oninput="updateVolume(this.value)">
            </div>
        </div>
        
        <button class="plan-b-option" onclick="openPage('/collection.html')" style="border: 1px solid var(--warning); margin-top: 10px;">
            <span style="color: var(--warning); font-weight: bold;">🏆 前往彩蛋與收集冊專區</span>
        </button>
        
        <div style="margin-top: auto; padding: 20px 0; text-align: center;">
            <span style="color: #555; font-size: 11px;">目前版本: v2.47 | 穩定部署版</span>
        </div>
    </div>
</div>

<div class="bottom-sheet" id="dynamic-sheet" style="padding:0; overflow:hidden;">
    <iframe id="spa-frame" style="width:100%; height:100%; border:none;"></iframe>
</div>

<audio id="bgm-audio"></audio>
<script src="/js/audio.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/main.js"></script>
<script src="/js/routing.js"></script>
</body>
</html>

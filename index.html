<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>末班車生存 | 深夜通勤導航</title>
    <script src="/js/guard.js"></script>
    <link rel="stylesheet" href="/css/style.css?v=settings_update">
</head>
<body>
<div class="container">
    <div class="header-row">
        <h1>末班車生存</h1>
        <div style="display: flex; gap: 8px;">
            <button class="mode-toggle-btn" onclick="openPage('/gemini.html')">🤖</button>
            <button class="mode-toggle-btn" id="header-mute-btn" onclick="toggleMute()">🔇</button>
            <button class="mode-toggle-btn" onclick="openPage('/search.html')">🔍</button>
        </div>
    </div>

    <div id="mode-survival">
        
        <div id="input-zone">
            
            <div class="location-block"><label>出發地</label><div class="select-group">
                <select class="type-select" id="start-type" onchange="updateStationOptions('start')">
                    <option value="trtc">北捷</option><option value="tra">台鐵</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="start-station-input" class="station-input" placeholder="選擇車站">
                    <span class="clear-btn" id="start-clear-btn">×</span>
                    <div id="start-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div></div>

            <div class="location-block" id="start-bus-stop-block" style="display: none; margin-top: 4px;"><div class="select-group">
                <div class="type-select-label">起點站牌</div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="start-bus-stop-input" class="station-input" placeholder="填寫站牌">
                    <span class="clear-btn" id="start-bus-clear-btn">×</span>
                </div>
            </div></div>

            <div class="location-block" id="transfer-block" style="display: none;">
                <label style="color:var(--warning);">轉乘北捷站</label>
                <div class="select-group">
                    <div class="type-select-label" style="background:#333; color:var(--warning);">🚉 轉乘</div>
                    <div class="autocomplete-wrapper">
                        <select id="transfer-station-input" class="station-input" style="padding-right: 12px;"></select>
                    </div>
                </div>
            </div>

            <div class="location-block"><label>目的地</label><div class="select-group">
                <select class="type-select" id="end-type" onchange="updateStationOptions('end')">
                    <option value="trtc">北捷</option><option value="thsr">高鐵</option><option value="bus">公車客運</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="end-station-input" class="station-input" placeholder="選擇車站">
                    <span class="clear-btn" id="end-clear-btn">×</span>
                    <div id="end-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div></div>

            <div class="location-block" id="end-bus-stop-block" style="display: none; margin-top: 4px;"><div class="select-group">
                <div class="type-select-label">終點站牌</div>
                <div class="autocomplete-wrapper">
                    <input type="text" id="end-bus-stop-input" class="station-input" placeholder="填寫站牌">
                    <span class="clear-btn" id="end-bus-clear-btn">×</span>
                </div>
            </div></div>

            <button id="action-btn" class="main-action-btn" onclick="handleAction()">開始計算轉乘</button>
        </div>

        <div id="result-zone">
            <div class="time-area">
                <div class="status">現在時間</div>
                <div id="time-display" class="time-display">00:00:00</div>
                <div class="status">目標發車：<span id="speed-mode" style="color: #ffea00;">待查驗...</span></div>
            </div>
            <div id="plan-b-container" class="plan-b-container">
                <a href="https://www.uber.com" class="plan-b-option"><span>呼叫 Uber</span><span>~$300</span></a>
                <button class="btn-reset" style="display:flex;" onclick="resetPlan()">🔄 重新安排行程</button>
            </div>
            <button id="cancel-btn" class="btn-reset" onclick="resetPlan()">🔄 中止求生</button>
        </div>

    </div>

    <div class="footer">
        <div>本服務由綠茶地瓜維護</div>
        <div class="footer-links-container">
            <a class="footer-toggle" onclick="toggleContact()">👉 聯絡我們 👈</a>
            <a class="footer-toggle" onclick="openSettingsSheet()">⚙️ 快速設定</a>
        </div>
        <div id="contact-links" class="contact-links">
            <a href="mailto:x778888778@gmail.com" class="contact-btn" style="background:#ea4335;">✉️ Gmail</a>
            <a href="https://discord.gg/vPgU2KaSZr" class="contact-btn" style="background:#5865F2;">💬 Discord</a>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closeAllSheets()"></div>

<div class="bottom-sheet" id="settings-sheet">
    <div class="sheet-header">
        <h3 style="margin:0; font-size: 18px;">⚙️ 快速設定</h3>
        <button onclick="closeAllSheets()" style="background:var(--danger); color:white; border:none; padding:6px 14px; border-radius:8px; cursor:pointer; font-weight:bold;">關閉</button>
    </div>
    <div class="sheet-content">
        <button class="plan-b-option" onclick="shareApp()" style="background-color: #2a2a2a;"><span>🔗 分享這個求生工具給朋友</span></button>
        <button class="plan-b-option" onclick="openPage('/about.html')"><span>📖 快速使用說明</span></button>
        <button class="plan-b-option" onclick="openPage('/developer.html')"><span>👨‍💻 開發者資訊</span></button>
        
        <div style="background: #222; padding: 15px; border-radius: 12px; border: 1px solid #333;">
            <h4 style="color: var(--text-sub); margin: 0 0 10px 0; font-size: 13px;">🎵 背景音樂設定</h4>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button id="mute-btn" style="background: none; border: none; font-size: 24px; cursor: pointer;" onclick="toggleMute()">🔇</button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.3" style="flex: 1;" oninput="updateVolume(this.value)">
            </div>
        </div>
        
        <button class="plan-b-option" onclick="openPage('/collection.html')" style="border: 1px solid var(--warning);">
            <span style="color: var(--warning); font-weight: bold;">🏆 前往彩蛋與收集冊專區</span>
        </button>

        <div style="text-align: center; color: #555; font-size: 11px; margin-top: auto; padding-top: 15px;">
            v2.0.0 - 微服務防彈版
        </div>
    </div>
</div>

<div class="bottom-sheet" id="dynamic-sheet" style="padding:0; overflow:hidden; height: 92vh;">
    <iframe id="spa-frame" style="width:100%; height:100%; border:none; background: var(--bg-color);"></iframe>
</div>

<audio id="bgm-audio"></audio>
<script src="/js/audio.js"></script><script src="/js/ui.js"></script>
<script src="/js/survival-ui.js"></script><script src="/js/survival-engine.js"></script><script src="/js/routing.js"></script>
</body>
</html>

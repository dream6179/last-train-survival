<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>開發者資訊 | 末班車生存</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #aaaaaa; --danger: #ff5252; --info: #2196F3; --warning: #ffb300; --success: #4caf50; }
        
        html, body { overflow-x: hidden; height: 100%; width: 100%; margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Segoe UI', Roboto, sans-serif; color: var(--text-main); -webkit-user-select: none; user-select: none; }
        
        /* 🌟 究極去白條魔法 */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* 🌟 防止黑屏：電視機(Iframe) 專屬佈局 */
        body { display: flex; flex-direction: column; align-items: flex-start; overflow-y: auto; }

        .container { width: 90%; max-width: 400px; padding: 20px 0 50px 0; margin: 0 auto; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #333; width: 100%; }
        .header-row h1 { font-size: 20px; margin: 0; color: var(--text-main); }
        
        /* 🌟 修正後的返回按鈕：回到設定頁面 */
        .back-btn { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; transition: 0.2s; }
        .back-btn:active { background: #555; transform: scale(0.95); }

        .section { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; width: 100%; box-sizing: border-box; }
        .section h3 { margin-top: 0; border-bottom: 1px dashed #444; padding-bottom: 10px; color: var(--success); font-size: 16px; }
        
        /* 🌟 撿回來的酷酷按鈕樣式 */
        .link-btn { display: block; background: #1a1a1a; color: white; border: 1px solid #555; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 15px; transition: 0.1s; cursor: pointer; width: 100%; box-sizing: border-box; }
        .link-btn:active { background: #333; transform: scale(0.98); }

        .link-btn-secondary { display: block; background: rgba(33, 150, 243, 0.1); color: var(--info); border: 1px dashed var(--info); text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 14px; margin-top: 10px; transition: 0.1s; cursor: pointer; width: 100%; box-sizing: border-box; }
        .link-btn-secondary:active { background: rgba(33, 150, 243, 0.2); transform: scale(0.98); }
        
        .avatar { font-size: 50px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1>👨‍💻 開發者資訊</h1>
            <a href="javascript:void(0)" onclick="if(window.parent && window.parent.closePageOnly) { window.parent.closePageOnly(); } else { window.location.href='/'; }" class="back-btn">⬅ 返回設定</a>
        </div>

        <div class="section">
            <div class="avatar">🍠</div>
            <h3>👨‍💻 關於作者</h3>
            <p style="font-size: 14px; color: var(--text-sub); margin-top: 0; line-height: 1.6;">
                本服務由 <strong>綠茶地瓜</strong> 獨立開發與維護。<br><br>
                這是一個為了拯救無數在深夜狂奔的社畜與夜貓子而誕生、不斷進化的生存工具。
            </p>
            
            <a href="https://home.gamer.com.tw/artwork.php?sn=6312909" target="_blank" class="link-btn">📝 版本更新日誌 (功能與除錯)</a>
            <a href="https://home.gamer.com.tw/artwork.php?sn=6312913" target="_blank" class="link-btn-secondary">🧠 App 開發秘辛與碎碎念</a>
        </div>

        <div class="section">
            <h3 style="color: var(--warning);">🛠️ 實驗性功能</h3>
            <button id="dev-mode-btn" onclick="toggleDevMode()" class="link-btn" style="border-color: var(--warning); color: var(--warning);">
                🔧 正在檢查狀態...
            </button>
            <p style="font-size: 11px; color: #888; margin-top: 10px; text-align: center;">啟用後鎖定時間為 23:30，方便測試末班車邏輯</p>
        </div>
        
        <div style="text-align: center; color: #444; font-size: 10px; margin-top: 20px;">
            Version 2.21 - SPA Multi-Service Edition
        </div>
    </div> 
    
    <script>
        function updateDevBtn() {
            const btn = document.getElementById('dev-mode-btn');
            if(!btn) return;
            if(localStorage.getItem('dev_mode_active') === 'true') {
                btn.innerHTML = "🔴 關閉開發者模式";
                btn.style.color = "var(--danger)";
                btn.style.borderColor = "var(--danger)";
            } else {
                btn.innerHTML = "🔧 啟用開發者模式";
                btn.style.color = "var(--warning)";
                btn.style.borderColor = "var(--warning)";
            }
        }
        
        window.addEventListener('DOMContentLoaded', updateDevBtn);

        async function toggleDevMode() {
            if(localStorage.getItem('dev_mode_active') === 'true') {
                localStorage.setItem('dev_mode_active', 'false');
                alert("🔴 已關閉開發者模式，恢復現實時間。");
                updateDevBtn();
                if(window.parent) window.parent.location.reload();
            } else {
                const pwd = prompt("🔒 請輸入工程模式密碼：");
                if (pwd === null) return;

                try {
                    const res = await fetch('/data/config.json?t=' + new Date().getTime());
                    const data = await res.json();
                    
                    if(pwd === data.dev_key) {
                        localStorage.setItem('dev_mode_active', 'true');
                        alert("✅ 密碼正確！已啟用開發者模式。\n(時間將鎖定為 23:30)");
                        updateDevBtn();
                        if(window.parent) window.parent.location.reload();
                    } else {
                        alert("❌ 密碼錯誤！");
                    }
                } catch (e) {
                    alert("❌ 系統錯誤，無法驗證鑰匙。");
                }
            }
        }
    </script>
</body>
</html>

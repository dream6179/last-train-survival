<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時刻表查詢</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 🌟 電視機專屬疫苗：解除首頁的置中與鎖死捲軸限制 */
        html, body { 
            overflow-y: auto !important; 
            height: 100% !important; 
            display: block !important;   
            background: transparent !important;
        }
        body { padding: 20px; box-sizing: border-box; }
        .search-wrapper { 
            max-width: 400px; margin: 0 auto; min-height: 100%; 
            display: flex; flex-direction: column; 
        }
        #search-result-box { flex-grow: 1; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="search-wrapper">
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;">
            <h2 style="color: var(--info); margin: 0; font-size: 20px;">🔍 班次時刻檢索</h2>
            <button onclick="if(window.parent && window.parent.closePageOnly) { window.parent.closePageOnly(); } else { window.location.href='/'; }" style="background: var(--danger); color: white; border: none; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-weight: bold;">關閉</button>
        </div>
        
        <div class="location-block">
            <label>查詢車站</label>
            <div class="select-group">
                <select class="type-select" id="search-type" onchange="window.updateSearchOptions && window.updateSearchOptions()">
                    <option value="trtc" selected>北捷</option>
                    <option value="tra">台鐵</option>
                    <option value="thsr">高鐵</option>
                </select>
                <div class="autocomplete-wrapper">
                    <input type="text" id="search-station-input" class="station-input" placeholder="輸入車站名稱">
                    <span class="clear-btn" id="search-clear-btn">×</span>
                    <div id="search-autocomplete-list" class="autocomplete-list"></div>
                </div>
            </div>
        </div>

        <button id="search-action-btn" class="main-action-btn" style="background-color: var(--info); margin-top:15px; border-radius: 12px;" onclick="window.executeFullSearch && window.executeFullSearch()">查詢發車時刻</button>
        
        <div class="search-result-box" id="search-result-box" style="margin-top: 15px; background: #222; border-radius: 10px; padding: 15px; color: #aaa; font-size: 13px; border: 1px dashed #444; overflow-y: auto;">
            等待檢索指令...
        </div>
        
    </div>
    
    <script src="/js/search.js"></script>
</body>
</html>
